# ─────────────────────────────────────────────────────────────────────────────
# Netlify Configuration for ARJHBD
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# ─────────────────────────────────────────────────────────────────────────────
# Netlify Functions must NOT be intercepted by SPA redirect.
# This rule ensures /.netlify/* passes through to functions.
# ─────────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200

# ─────────────────────────────────────────────────────────────────────────────
# SPA fallback — all OTHER routes serve index.html
# ─────────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─────────────────────────────────────────────────────────────────────────────
# Security headers
# ─────────────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ─────────────────────────────────────────────────────────────────────────────
# Cache hashed JS/CSS assets immutably (Vite adds content hashes)
# ─────────────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────────────────────────────────────
# Cache images aggressively (1 year, revalidate on deploy)
# ─────────────────────────────────────────────────────────────────────────────
[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────────────────────────────────────
# Cache media (video/audio) — long-lived, these rarely change
# ─────────────────────────────────────────────────────────────────────────────
[[headers]]
  for = "*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.mpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.mp3"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────────────────────────────────────
# Serve pre-compressed Brotli/Gzip when available
# ─────────────────────────────────────────────────────────────────────────────
[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
