# ─────────────────────────────────────────────────────────────────────────────
# Netlify Configuration for ARJHBD
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# ─────────────────────────────────────────────────────────────────────────────
# Netlify Functions must NOT be intercepted by SPA redirect.
# This rule ensures /.netlify/* passes through to functions.
# ─────────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200

# ─────────────────────────────────────────────────────────────────────────────
# SPA fallback — all OTHER routes serve index.html
# ─────────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─────────────────────────────────────────────────────────────────────────────
# Security headers
# ─────────────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
